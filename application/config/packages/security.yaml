security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
        harsh:
            algorithm: auto
            cost: 15
    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        users_in_memory: { memory: null }
        admin_user_provider:
            entity:
                class: Aropixel\AdminBundle\Entity\User
                property: email

    role_hierarchy:
        ROLE_USER:           [ROLE_USER]
        ROLE_ADMIN:          [ROLE_ADMIN]
        ROLE_CONTENT_EDITOR: [ROLE_ADMIN]
        ROLE_SUPER_ADMIN:    [ROLE_CONTENT_EDITOR, ROLE_ALLOWED_TO_SWITCH]
        ROLE_HYPER_ADMIN:    [ROLE_SUPER_ADMIN, ROLE_ALLOWED_TO_SWITCH]

    firewalls:
        backoffice:
            context: primary_auth
            pattern: ^/philosophy-club-band
            form_login:
                provider: admin_user_provider
                login_path: aropixel_admin_security_login
                use_forward: true
                use_referer: true
                check_path: aropixel_admin_security_check
                failure_path: aropixel_admin_security_login
                default_target_path: dashboard
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 2592000 # 1 month in seconds
                path: /philosophy-club-band
            logout:
                path: aropixel_admin_security_logout
                target: aropixel_admin_security_login
            #anonymous: true
            entry_point: Aropixel\AdminBundle\Infrastructure\Security\LoginFormAuthenticator
            custom_authenticators:
                - Aropixel\AdminBundle\Infrastructure\Security\LoginFormAuthenticator
            provider: admin_user_provider
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            security: false

            # activate different ways to authenticate
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Easy way to control access for large sections of your site
    # Note: Only the *first* access control that matches will be used
    access_control:
        - { path: ^/philosophy-club-band/login$, role: PUBLIC_ACCESS }
        - { path: ^/philosophy-club-band/reset/, role: PUBLIC_ACCESS }
        - { path: ^/philosophy-club-band/activation/, role: PUBLIC_ACCESS }
        - { path: ^/philosophy-club-band/first/, role: PUBLIC_ACCESS }
        - { path: ^/philosophy-club-band, role: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
