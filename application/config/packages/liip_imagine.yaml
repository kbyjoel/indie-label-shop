# See dos how to configure the bundle: https://symfony.com/doc/current/bundles/LiipImagineBundle/basic-usage.html
when@prod:
    liip_imagine:
        resolvers:
            default:
                flysystem:
                    filesystem_service: 'public.storage'
                    cache_prefix: "media/cache"
                    root_url: 'https://xxxx.cellar-c2.services.clever-cloud.com/public'
when@dev:
    liip_imagine:
        resolvers:
            default:
                web_path:
                    web_root: "%kernel.project_dir%/public"
                    cache_prefix: "media/cache"
        loaders:
            default:
                filesystem:
                    data_root: "%kernel.project_dir%/private"

liip_imagine:
    # valid drivers options include "gd" or "gmagick" or "imagick"
    driver: "imagick"

    # define your filter sets under this option
    filter_sets:
        album_card:
            quality: 80
            filters:
                thumbnail: { size: [400, 400], mode: outbound }

        album_artwork:
            quality: 85
            filters:
                thumbnail: { size: [800, 800], mode: inset }

        band_card:
            quality: 80
            filters:
                thumbnail: { size: [400, 400], mode: outbound }

aropixel_admin:
    filter_sets:

